<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappyTopUp | Premium Game Top-Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary-color: #667eea;
            --accent-color: #764ba2;
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: #2d3436;
        }
        /* Navbar Styling */
        
        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: #2d3436;
        }
        
        .logo span {
            color: var(--primary-color);
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }
        /* Hero Banner */
        
        .game-banner {
            border-radius: 24px;
            overflow: hidden;
            margin-top: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
            background: white;
        }
        
        .banner-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        
        .game-info {
            padding: 20px;
        }
        
        .game-info h1 {
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        /* Form Sections */
        
        .form-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: none;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .step-number {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .section-title h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }
        /* Item Grid */
        
        .grid-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .item-card {
            cursor: pointer;
            position: relative;
        }
        
        .item-card input {
            position: absolute;
            opacity: 0;
        }
        
        .card-content {
            border: 2px solid #f1f2f6;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .item-card input:checked+.card-content {
            border-color: var(--primary-color);
            background-color: rgba(102, 126, 234, 0.05);
            transform: translateY(-5px);
        }
        /* Payment List */
        
        .payment-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .payment-item input {
            margin-right: 15px;
        }
        
        .payment-item img {
            width: 60px;
            margin-right: 15px;
            border-radius: 5px;
        }
        /* Button Checkout */
        
        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 30px;
            transition: transform 0.3s ease;
        }
        
        .btn-checkout:hover {
            transform: scale(1.02);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        /* Footer */
        
        footer {
            margin-top: 50px;
            padding: 40px 0;
            background: white;
            text-align: center;
            border-radius: 40px 40px 0 0;
        }
        
        .social-links a {
            text-decoration: none;
            color: #636e72;
            margin: 0 15px;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }
        
        .social-links a:hover {
            color: var(--primary-color);
        }
        
        .social-links i {
            margin-right: 8px;
            width: 18px;
        }
    </style>
</head>

<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand logo" href="#">Happy <span>Top Up</span></a>
            <div class="user-profile d-flex align-items-center">
                <span class="username me-3 d-none d-md-block fw-bold">GamerPro_99</span>
                <img src="img/mobilejen.jpeg" alt="Profile" class="avatar">
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="game-banner">
            <img src="img/banner.jpg" alt="Banner Game" class="banner-img">
            <div class="game-info text-center text-md-start">
                <h1>Mobile Legends: Bang Bang</h1>
                <p class="text-muted">Proses instan 24 jam. Masukkan data dan pilih nominal.</p>
            </div>
        </section>

        <form id="topup-form">
            <section class="form-section">
                <div class="section-title">
                    <span class="step-number">1</span>
                    <h2>Lengkapi Data Akun</h2>
                </div>
                <div class="row g-3">
                    <div class="col-8 col-md-9">
                        <input type="text" class="form-control form-control-lg" placeholder="Masukkan User ID" required>
                    </div>
                    <div class="col-4 col-md-3">
                        <input type="text" class="form-control form-control-lg" placeholder="(Zone ID)" required>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <div class="section-title">
                    <span class="step-number">2</span>
                    <h2>Pilih Nominal Top Up</h2>
                </div>
                <div class="grid-items">
                    <label class="item-card">
                        <input type="radio" name="nominal" value="50">
                        <div class="card-content">
                            <p class="mb-1 fw-bold">50 Diamonds</p>
                            <span class="text-primary fw-bold">Rp 15.000</span>
                        </div>
                    </label>
                    <label class="item-card">
                        <input type="radio" name="nominal" value="100">
                        <div class="card-content">
                            <p class="mb-1 fw-bold">100 Diamonds</p>
                            <span class="text-primary fw-bold">Rp 30.000</span>
                        </div>
                    </label>
                    <label class="item-card">
                        <input type="radio" name="nominal" value="250">
                        <div class="card-content">
                            <p class="mb-1 fw-bold">250 Diamonds</p>
                            <span class="text-primary fw-bold">Rp 75.000</span>
                        </div>
                    </label>
                </div>
            </section>

            <section class="form-section">
                <div class="section-title">
                    <span class="step-number">3</span>
                    <h2>Metode Pembayaran</h2>
                </div>
                <div class="payment-list">
                    <label class="payment-item d-flex align-items-center">
                        <input type="radio" name="payment" value="qris" class="form-check-input">
                        <img src="img/qris.jpg" alt="QRIS">
                        <div class="flex-grow-1">
                            <p class="mb-0 fw-bold">QRIS</p>
                            <small class="text-muted">Biaya admin Rp 0</small>
                        </div>
                    </label>
                    <label class="payment-item d-flex align-items-center">
                        <input type="radio" name="payment" value="gopay" class="form-check-input">
                        <img src="img/gopay.webp" alt="Gopay">
                        <div class="flex-grow-1">
                            <p class="mb-0 fw-bold">Gopay</p>
                            <small class="text-muted">Konfirmasi instan</small>
                        </div>
                    </label>
                </div>
            </section>

            <button type="submit" class="btn btn-checkout">Beli Sekarang</button>
        </form>
    </main>

    <footer>
        <div class="container">
            <p class="fw-bold mb-4">Temukan kami di:</p>
            <div class="social-links d-flex justify-content-center">
                <a href="https://www.instagram.com/happyisyaganteng/" target="_blank">
                    <i data-feather="instagram"></i> Instagram
                </a>
                <a href="https://www.tiktok.com/@isyaagpz_" target="_blank">
                    <i data-feather="music"></i> TikTok
                </a>
            </div>
            <hr class="my-4 opacity-25">
            <p class="text-muted small">&copy; 2026 HappyTopUp. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        feather.replace();
    </script>
</body>

</html>
